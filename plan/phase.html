<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorksOS Phase Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      /* Dark Theme (Default) */
      --bg-base: #0f0f11;
      --bg-surface: #18181c;
      --bg-surface-hover: #222228;
      --border-color: #27272a;
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      
      /* Status Colors */
      --color-completed: #10b981;
      --color-inprogress: #A50034; /* LG Red */
      --color-inprogress-soft: rgba(165, 0, 52, 0.12);
      --color-notstarted: #71717a;
      --color-blocked: #f59e0b;
      --color-skipped: #6b7280;
      
      --radius-lg: 10px;
      --radius-md: 6px;
      --font-sans: 'Pretendard', -apple-system, sans-serif;
    }

    body.light-theme {
      /* Light Theme overrides */
      --bg-base: #fafafa;
      --bg-surface: #ffffff;
      --bg-surface-hover: #f4f4f5;
      --border-color: #e4e4e7;
      --text-main: #18181b;
      --text-muted: #71717a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.2s, border-color 0.2s;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      line-height: 1.5;
      padding: 2rem 1rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo {
      background-color: var(--color-inprogress);
      color: #ffffff;
      font-weight: 800;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .theme-toggle {
      background-color: var(--bg-surface);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 0.5rem 1rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 500;
      font-size: 0.875rem;
    }

    .theme-toggle:hover {
      background-color: var(--bg-surface-hover);
    }

    /* Total Stats */
    .stats-card {
      background-color: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .stat-label {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .progress-container {
      grid-column: span 2;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      justify-content: center;
    }

    .progress-bar-bg {
      background-color: var(--bg-base);
      border: 1px solid var(--border-color);
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar-fill {
      background-color: var(--color-completed);
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.5s ease-out;
    }

    /* Dropzone area */
    .dropzone {
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      text-align: center;
      color: var(--text-muted);
      cursor: pointer;
      background-color: var(--bg-surface);
      font-size: 0.875rem;
      font-weight: 500;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .dropzone:hover, .dropzone.dragover {
      border-color: var(--color-inprogress);
      background-color: var(--bg-surface-hover);
    }

    /* Timeline Map */
    .timeline-map {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
      overflow-x: auto;
      padding-bottom: 0.75rem;
    }

    .timeline-step {
      flex: 1;
      min-width: 140px;
      background-color: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      cursor: pointer;
      position: relative;
    }

    .timeline-step:hover {
      background-color: var(--bg-surface-hover);
    }

    .timeline-step.active-step {
      border-color: var(--color-inprogress);
    }

    .step-num {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    .step-title {
      font-size: 0.875rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .step-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      align-self: flex-start;
      margin-top: 0.25rem;
      text-transform: uppercase;
    }

    /* Grid of Cards */
    .phases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 1.5rem;
    }

    .phase-card {
      background-color: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scroll-margin-top: 2rem;
    }

    .phase-card.inprogress-border {
      border-color: var(--color-inprogress);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .card-title-group {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .card-phase-num {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--color-inprogress);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .badge-completed { background-color: rgba(16, 185, 129, 0.15); color: #10b981; }
    .badge-inprogress { background-color: var(--color-inprogress-soft); color: var(--color-inprogress); }
    .badge-notstarted { background-color: rgba(113, 113, 122, 0.15); color: var(--text-muted); }
    .badge-blocked { background-color: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .badge-skipped { background-color: rgba(107, 114, 128, 0.15); color: #6b7280; }

    .card-badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      white-space: nowrap;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      min-height: 48px;
    }

    .card-progress-section {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .progress-text-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* Tasks list */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .task-item {
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .task-header {
      background-color: var(--bg-base);
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .task-header:hover {
      background-color: var(--bg-surface-hover);
    }

    .task-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: 0;
    }

    .task-bullet {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .bullet-completed { background-color: var(--color-completed); }
    .bullet-inprogress { background-color: var(--color-inprogress); }
    .bullet-notstarted { background-color: var(--color-notstarted); }
    .bullet-blocked { background-color: var(--color-blocked); }
    .bullet-skipped { background-color: var(--color-skipped); }

    .task-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-status-text {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: capitalize;
    }

    .task-content {
      padding: 1rem;
      background-color: var(--bg-surface);
      border-top: 1px solid var(--border-color);
      display: none;
      flex-direction: column;
      gap: 0.75rem;
    }

    .task-content.show {
      display: flex;
    }

    .task-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .subtasks-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .subtask-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      padding-left: 0.25rem;
    }

    .subtask-item {
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-main);
    }

    .subtask-bullet {
      width: 4px;
      height: 4px;
      background-color: var(--text-muted);
      border-radius: 50%;
    }

    @media (max-width: 768px) {
      .phases-grid {
        grid-template-columns: 1fr;
      }
      .stats-card {
        grid-template-columns: 1fr;
      }
      .progress-container {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <div class="title-area">
        <span class="logo">LG</span>
        <h1>WorksOS Phase Dashboard</h1>
      </div>
      <button class="theme-toggle" id="themeBtn">🌙 Dark Mode</button>
    </div>

    <!-- Dropzone -->
    <div class="dropzone" id="dropzone">
      📁 여기에 <code>plan/*.json</code> 파일들을 드래그 앤 드롭하거나 클릭하여 상태 정보를 실시간으로 업데이트하세요.
      <input type="file" id="fileInput" multiple accept=".json" style="display: none;">
    </div>

    <!-- Total Stats -->
    <div class="stats-card">
      <div class="stat-item">
        <span class="stat-label">진행률 (Overall Progress)</span>
        <span class="stat-value" id="overallPercent">0%</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">완료 태스크 / 전체 태스크</span>
        <span class="stat-value" id="taskCounts">0 / 0</span>
      </div>
      <div class="progress-container">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="overallProgressBar"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- Timeline Map -->
  <div class="timeline-map" id="timelineMap"></div>

  <!-- Phase Cards Grid -->
  <main class="phases-grid" id="phasesGrid"></main>

    let currentPhases = window.__INITIAL_DATA__ || [];
    
    // Status translation for human readable
    const statusLabels = {
      'not_started': '대기',
      'in_progress': '진행중',
      'completed': '완료',
      'blocked': '차단됨',
      'skipped': '건너뜀'
    };

    // Dark/Light Theme Control
    const themeBtn = document.getElementById('themeBtn');
    
    // Default theme check
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light-theme');
      themeBtn.textContent = '☀️ Light Mode';
    }

    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('light-theme');
      if (document.body.classList.contains('light-theme')) {
        localStorage.setItem('theme', 'light');
        themeBtn.textContent = '☀️ Light Mode';
      } else {
        localStorage.setItem('theme', 'dark');
        themeBtn.textContent = '🌙 Dark Mode';
      }
    });

    // File Drag & Drop Control
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');

    dropzone.addEventListener('click', () => fileInput.click());
    
    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('dragover');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', () => {
      handleFiles(fileInput.files);
    });

    function handleFiles(files) {
      let filesToRead = Array.from(files).filter(f => f.name.endsWith('.json'));
      if (filesToRead.length === 0) return;

      let loadedCount = 0;
      filesToRead.forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            const data = JSON.parse(e.target.result);
            if (typeof data.phase === 'number') {
              // Replace or add data
              const existingIdx = currentPhases.findIndex(p => p.phase === data.phase);
              if (existingIdx !== -1) {
                currentPhases[existingIdx] = data;
              } else {
                currentPhases.push(data);
              }
            }
          } catch (err) {
            console.error('Error parsing uploaded JSON:', err);
          }
          loadedCount++;
          if (loadedCount === filesToRead.length) {
            currentPhases.sort((a, b) => a.phase - b.phase);
            renderDashboard();
          }
        };
        reader.readAsText(file);
      });
    }

    // Try auto fetch if served locally via server
    async function tryFetchPhases() {
      try {
        const fetched = [];
        for (let i = 0; i <= 7; i++) {
          const res = await fetch('./phase_' + i + '.json');
          if (res.ok) {
            const json = await res.json();
            fetched.push(json);
          }
        }
        if (fetched.length > 0) {
          currentPhases = fetched.sort((a, b) => a.phase - b.phase);
          renderDashboard();
        }
      } catch (e) {
        // Silent fall back to embedded data
      }
    }

    // Main Render Function
    function renderDashboard() {
      const grid = document.getElementById('phasesGrid');
      const timeline = document.getElementById('timelineMap');
      grid.innerHTML = '';
      timeline.innerHTML = '';

      let totalTasks = 0;
      let completedTasks = 0;

      currentPhases.forEach((phaseData) => {
        // Count tasks
        const tCount = phaseData.tasks ? phaseData.tasks.length : 0;
        const cCount = phaseData.tasks ? phaseData.tasks.filter(t => t.status === 'completed').length : 0;
        totalTasks += tCount;
        completedTasks += cCount;

        // 1. Create Timeline Step
        const step = document.createElement('div');
        const isActive = phaseData.status === 'in_progress' ? 'active-step' : '';
        step.className = 'timeline-step ' + isActive;
        step.onclick = () => {
          const cardEl = document.getElementById('phase-card-' + phaseData.phase);
          if (cardEl) {
            cardEl.scrollIntoView({ behavior: 'smooth' });
            // Highlight temporarily
            cardEl.style.outline = '2px solid var(--color-inprogress)';
            setTimeout(() => cardEl.style.outline = 'none', 1500);
          }
        };

        const badgeClass = 'badge-' + phaseData.status.replace('_', '');
        const titleKoOrEn = phaseData.title_ko || phaseData.title;
        const statusLabel = statusLabels[phaseData.status] || phaseData.status;

        step.innerHTML = `
          <span class="step-num">PHASE ${phaseData.phase}</span>
          <span class="step-title" title="${titleKoOrEn}">${titleKoOrEn}</span>
          <span class="step-badge ${badgeClass}">${statusLabel}</span>
        `;
        timeline.appendChild(step);

        // 2. Create Grid Card
        const card = document.createElement('div');
        card.id = 'phase-card-' + phaseData.phase;
        const isProgressBorder = phaseData.status === 'in_progress' ? 'inprogress-border' : '';
        card.className = 'phase-card ' + isProgressBorder;

        const progressPercent = tCount > 0 ? Math.round((cCount / tCount) * 100) : 0;

        // Render tasks HTML
        let tasksHtml = '';
        if (phaseData.tasks && phaseData.tasks.length > 0) {
          phaseData.tasks.forEach((task, tIdx) => {
            const bulletClass = 'bullet-' + task.status.replace('_', '');
            
            // Subtasks if exist
            let subtasksHtml = '';
            if (task.subtasks && task.subtasks.length > 0) {
              const subItems = task.subtasks.map(sub => `
                <li class="subtask-item">
                  <span class="subtask-bullet"></span>
                  <span>${sub}</span>
                </li>
              `).join('');

              subtasksHtml = `
                <div class="task-desc">${task.description || ''}</div>
                <div class="subtasks-title">세부 항목</div>
                <ul class="subtask-list">
                  ${subItems}
                </ul>
              `;
            } else if (task.description) {
              subtasksHtml = `<div class="task-desc">${task.description}</div>`;
            }

            const tStatusLabel = statusLabels[task.status] || task.status;

            tasksHtml += `
              <div class="task-item">
                <div class="task-header" onclick="toggleAccordion('task-content-${phaseData.phase}-${tIdx}')">
                  <div class="task-left">
                    <span class="task-bullet ${bulletClass}"></span>
                    <span class="task-title" title="${task.title}">${task.title}</span>
                  </div>
                  <span class="task-status-text">${tStatusLabel}</span>
                </div>
                <div class="task-content" id="task-content-${phaseData.phase}-${tIdx}">
                  ${subtasksHtml || '<div class="task-desc">상세 설명이 없습니다.</div>'}
                </div>
              </div>
            `;
          });
        } else {
          tasksHtml = '<div style="font-size: 0.875rem; color: var(--text-muted); text-align: center; padding: 1rem;">태스크가 아직 등록되지 않았습니다.</div>';
        }

        const barColor = phaseData.status === 'completed' ? 'var(--color-completed)' : 'var(--color-inprogress)';

        card.innerHTML = `
          <div class="card-header">
            <div class="card-title-group">
              <span class="card-phase-num">Phase ${phaseData.phase}</span>
              <h3 class="card-title" title="${titleKoOrEn}">${titleKoOrEn}</h3>
            </div>
            <span class="card-badge ${badgeClass}">${statusLabel}</span>
          </div>
          <p class="card-desc">${phaseData.description || '설명이 작성되지 않았습니다.'}</p>
          
          <div class="card-progress-section">
            <div class="progress-text-row">
              <span>작업 완료율</span>
              <span>${cCount} / ${tCount} (&nbsp;${progressPercent}%)</span>
            </div>
            <div class="progress-bar-bg" style="height: 8px;">
              <div class="progress-bar-fill" style="width: ${progressPercent}%; background-color: ${barColor}"></div>
            </div>
          </div>

          <div class="task-list">
            ${tasksHtml}
          </div>
        `;
        grid.appendChild(card);
      });

      // Update Top Stats
      const overallPercent = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
      document.getElementById('overallPercent').textContent = overallPercent + '%';
      document.getElementById('taskCounts').textContent = completedTasks + ' / ' + totalTasks;
      document.getElementById('overallProgressBar').style.width = overallPercent + '%';
    }

    function toggleAccordion(id) {
      const el = document.getElementById(id);
      if (el) {
        el.classList.toggle('show');
      }
    }

    // Start Dashboard
    renderDashboard();
    tryFetchPhases();
  </script>
</body>
</html>
